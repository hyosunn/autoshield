{% extends "layout.html" %}
{% block content %}
<header class="w3-container w3-center w3-padding-64">
    <h1 class="w3-jumbo"><b>AutoShield</b></h1>
</header>
<div class="w3-content w3-justify w3-text-white w3-padding-64">
    <div class="w3-card-4 w3-padding-32 w3-center" style="background-color:#1f2e38; border-radius:15px;">
        <i class="fa fa-exclamation-triangle w3-xxlarge" style="color:#e74c3c;"></i>
        <h2>Data Unavailable</h2>
        <p style="font-size:1.1rem;">{{ message }}</p>
        <a href="/" class="w3-button w3-round" style="background-color:#2c5364; color:white; margin-top:16px;">
            Try Again
        </a>
    </div>
</div>
{% endblock %}
